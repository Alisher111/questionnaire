<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/questionnaire_style.css">
  <title>GB: Questionnaire</title>

  <style>
    .hidden { display: none; }
  </style>

  <script>
    function toggleSection(className) {
      document.querySelector("." + className).classList.toggle("hidden");
    }
  </script>
</head>

<body>

<header>
  <div class="scammers">
    <img src="css/logo.png" width="100" height="50">
    <img src="css/menu-icon.png" width="55" height="35">
    <img src="css/magnglass.png" width="36" height="36">
  </div>
</header>

<main>

  <h2>APPLICATION QUESTIONNAIRE</h2>

  <p>Fill the form below carefully.</p>

  <form>

    <!-- PERSONAL -->
    <section>
      <h3>Personal Information</h3>

      <div class="grid">
        <input placeholder="First Name">
        <input placeholder="Middle Name">
        <input placeholder="Last Name">
        <input placeholder="Preferred Name">
      </div>

      <input placeholder="Student ID">
      <input placeholder="Email">
      <input placeholder="Phone number">
    </section>

    <!-- EDUCATION -->
    <section>
      <h3 onclick="toggleSection('edu')">Education ▼</h3>

      <div class="edu hidden">
        <input placeholder="Institution">
        <input placeholder="Level">
        <input placeholder="Graduation Year">
        <input placeholder="Program">
        <input placeholder="Major">
      </div>
    </section>

    <!-- WORK -->
    <section>
      <h3 onclick="toggleSection('work')">Work Experience ▼</h3>

      <div class="work hidden">
        <input placeholder="Job Title">
        <input placeholder="Company">
        <input placeholder="Location">
        <input type="date">
        <input type="date">
        <textarea placeholder="Role description"></textarea>
      </div>
    </section>

    <!-- SKILLS -->
    <section>
      <h3 onclick="toggleSection('skills')">Skills ▼</h3>

      <div class="skills hidden">
        <input placeholder="Programming language">
        <select>
          <option>Beginner</option>
          <option>Intermediate</option>
          <option>Advanced</option>
        </select>

        <input placeholder="Framework">
        <select>
          <option>Beginner</option>
          <option>Intermediate</option>
          <option>Advanced</option>
        </select>
      </div>
    </section>

    <!-- PORTFOLIO -->
    <section>
      <h3>Portfolio</h3>
      <input placeholder="Link to portfolio">
    </section>

    <!-- TEXTAREAS -->
    <section>
      <h3>Motivation</h3>
      <textarea placeholder="Describe your project experience"></textarea>
      <textarea placeholder="Describe your skills"></textarea>
      <textarea placeholder="Career goals"></textarea>
    </section>

    <button type="submit">Submit</button>

  </form>

</main>
<footer class="footer">

  <div class="footer-content">

    <h3>Contact us</h3>

    <div class="footer-links">
      <a href="mailto:admissions@georgebrown.ca">Email</a>
       <a href="mailto:intladmissions@georgebrown.ca">International Email</a>
      <a href="https://www.linkedin.com/company/george-brown-college-foundation/?originalSubdomain=ca" target="_blank">LinkedIn</a>
      <a href="https://www.instagram.com/gbcollege/" target="_blank">Instagram</a>
    </div>

    <p class="footer-text">
      © 2024 Alisher Akhmedyarov  for George Brown College | All Rights Reserved
    </p>

  </div>

</footer>

</body>
</html>
